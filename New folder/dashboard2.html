<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard LMS</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- =========================
       NAVBAR
  ========================== -->

  <div class="navbar">

    <h2>📘 LMS Pemrograman Dasar</h2>

    <span>
      Selamat Datang Mahasiswa
    </span>

    <button onclick="logout()" class="logout-btn">
      Logout
    </button>

  </div>

</div>

  <!-- =========================
       LAYOUT
  ========================== -->

  <div class="layout">

    <!-- =========================
         SIDEBAR
    ========================== -->

    <div class="sidebar">

      <div
        class="menu-item active"
        onclick="bukaHalaman('dashboard', this)">

        🏠 Dashboard

      </div>

      <div
        class="menu-item"
        onclick="bukaHalaman('materi', this)">

        📚 Materi

      </div>

      <div
        class="menu-item"
        onclick="bukaHalaman('tugas', this)">

        📝 Tugas

      </div>

    </div>

    <!-- =========================
         CONTENT
    ========================== -->

    <div class="content">

      <!-- =========================
           DASHBOARD
      ========================== -->

      <div class="page aktif" id="dashboard">

        <div class="stat-grid">

          <!-- MATERI -->
          <div
            class="stat-card"
            onclick="bukaHalaman('materi')">

            <div class="angka">3</div>

            <div class="keterangan">
              Materi Aktif
            </div>

          </div>

          <!-- TUGAS -->
          <div
            class="stat-card"
            onclick="bukaHalaman('tugas')">

            <div class="angka">2</div>

            <div class="keterangan">
              Tugas
            </div>

          </div>

          <!-- POIN -->
          <div
            class="stat-card"
            onclick="lihatPoin()">

            <div class="angka">145</div>

            <div class="keterangan">
              Poin
            </div>

          </div>

          <!-- PROGRESS -->
          <div
            class="stat-card"
            onclick="lihatProgress()">

            <div class="angka">80%</div>

            <div class="keterangan">
              Progress
            </div>

          </div>

        </div>

      </div>

      <!-- =========================
           HALAMAN MATERI
      ========================== -->

      <div class="page" id="materi">

        <div class="konten-card">

          <h3>📚 Daftar Materi</h3>

          <div id="daftar-materi"></div>

        </div>

      </div>

      <!-- =========================
           HALAMAN TUGAS
      ========================== -->

      <div class="page" id="tugas">

        <!-- LIST TUGAS -->
        <div class="konten-card">

          <h3>📝 Daftar Tugas</h3>

          <div id="daftar-tugas"></div>

        </div>

        <!-- FORM TUGAS -->
        <div class="konten-card">

          <h3>📤 Kumpulkan Tugas</h3>

          <label>Pilih Tugas</label>

          <select id="pilih-tugas">

            <option>
              Latihan Algoritma
            </option>

            <option>
              Program Hello World
            </option>

          </select>

          <label>Jawaban</label>

          <textarea
            id="jawaban"
            placeholder="Tulis jawaban di sini...">
          </textarea>

          <button onclick="kumpulkanTugas()">

            Kumpulkan

          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- JAVASCRIPT -->
  <script src="app.js"></script>

</body>

</html>
